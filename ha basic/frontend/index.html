<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAProxy Load Balancer Demo</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="container">
        <h1>HAProxy Load Balancer</h1>
        <p>Click the button to send a request. The load balancer will route it to one of the 10 backend servers.</p>
        
        <button id="callButton">Call Backend</button>
        
        <div id="response" class="response-card" aria-live="polite">
            <div id="spinner" class="spinner" style="display: none;"></div>
            
            <div id="content">
                <p class="placeholder">Click the button to see which server responds...</p>
            </div>
        </div>
    </main>
</body>
</html>
