# ─────────────────────────────────────────────────────────
#  Logstash Pipeline Configuration
#  Receives GELF logs from Docker → Processes → Elasticsearch
# ─────────────────────────────────────────────────────────

input {
    # Docker GELF (Graylog Extended Log Format) log driver
    gelf {
        port => 12201
        type => "docker"
    }
}

filter {
    # Add project metadata
    mutate {
        add_field => {
            "environment" => "production"
            "project" => "ipd-loadbalancer"
        }
    }

    # Parse HAProxy access logs
    if [tag] == "haproxy" {
        grok {
            match => {
                "message" => "%{IP:client_ip}:%{INT:client_port} \[%{HAPROXYDATE:accept_date}\] %{NOTSPACE:frontend} %{NOTSPACE:backend_server} %{INT:time_request}/%{INT:time_queue}/%{INT:time_connect}/%{INT:time_response}/%{INT:time_total} %{INT:http_status_code} %{INT:bytes_read}"
            }
            tag_on_failure => ["_haproxy_parse_failure"]
        }

        if [http_status_code] {
            mutate {
                convert => {
                    "http_status_code" => "integer"
                    "time_total" => "integer"
                    "bytes_read" => "integer"
                }
            }
        }
    }

    # Parse Flask/Gunicorn access logs
    if [tag] == "backend" {
        grok {
            match => {
                "message" => "%{IP:remote_addr} - - \[%{HTTPDATE:timestamp}\] \"%{WORD:method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}\" %{INT:status_code} %{INT:response_size}"
            }
            tag_on_failure => ["_flask_parse_failure"]
        }

        if [status_code] {
            mutate {
                convert => { "status_code" => "integer" }
            }

            # Tag error responses for easy filtering
            if [status_code] >= 500 {
                mutate { add_tag => ["server_error"] }
            } else if [status_code] >= 400 {
                mutate { add_tag => ["client_error"] }
            }
        }
    }
}

output {
    # Send processed logs to Elasticsearch
    elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "logstash-%{+YYYY.MM.dd}"
    }

    # Uncomment for debugging:
    # stdout { codec => rubydebug }
}
