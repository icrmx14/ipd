# ─────────────────────────────────────────────────────────
#  HAProxy 2.8 Configuration
#  Intelligent Load Balancing for Containerized Backend
# ─────────────────────────────────────────────────────────

global
    log stdout format raw local0
    maxconn 4096

    # Docker internal DNS resolver for service discovery
    resolvers docker_resolver
        nameserver dns 127.0.0.11:53
        resolve_retries 3
        timeout resolve 1s
        timeout retry   1s
        hold valid      10s

# ─────────────────────────────────────────────────────────
#  Defaults
# ─────────────────────────────────────────────────────────
defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect  5000ms
    timeout client   50000ms
    timeout server   50000ms
    timeout check    3000ms

# ─────────────────────────────────────────────────────────
#  Stats Dashboard — :8404/stats
# ─────────────────────────────────────────────────────────
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
    stats auth admin:haproxy123

# ─────────────────────────────────────────────────────────
#  Main HTTP Frontend
# ─────────────────────────────────────────────────────────
frontend http_front
    bind *:8080

    # Request tracing
    unique-id-format %{+X}o\ %ci:%cp_%fi:%fp_%Ts_%rt:%pid
    unique-id-header X-Request-ID

    default_backend http_back

# ─────────────────────────────────────────────────────────
#  Backend Pool — Dynamic Server Discovery
# ─────────────────────────────────────────────────────────
backend http_back
    # Algorithm: roundrobin | leastconn | source
    balance source

    # Health checks
    option httpchk GET /health/
    http-check expect status 200

    # Server defaults: check every 5s, down after 3 failures, up after 2 successes
    default-server inter 5s fall 3 rise 2 maxconn 100

    # Dynamic service discovery via Docker DNS
    # Number should match or exceed max replicas
    server-template backend 20 backend:5000 check resolvers docker_resolver init-addr none
