<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPD Load Balancer — Live Demo</title>
    <meta name="description" content="Intelligent Containerized Load Balancing System — Interactive Frontend Demo">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <canvas id="particleCanvas"></canvas>
    <script src="script.js" defer></script>
</head>

<body>
    <footer class="planetary-nav" id="planetaryNav">
        <svg class="connectors" width="100%" height="100%">
            <polyline id="nav-line" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="6,4" class="connector-line"/>
        </svg>
        
        <div class="planet-container">
            <a href="http://localhost:9000" target="_blank" class="planet-wrapper p1">
                <div class="planet-sphere" style="--planet-color: var(--accent);"></div>
                <span class="planet-label">Controller Dashboard</span>
            </a>
            
            <a href="http://localhost:8404/stats" target="_blank" class="planet-wrapper p2">
                <div class="planet-sphere" style="--planet-color: var(--orange);"></div>
                <span class="planet-label">HAProxy Stats</span>
            </a>
            
            <a href="http://localhost:5601" target="_blank" class="planet-wrapper p3">
                <div class="planet-sphere" style="--planet-color: var(--green);"></div>
                <span class="planet-label">Kibana</span>
            </a>

            <a href="#action-controls" class="planet-wrapper p4" id="lb-planet">
                <div class="planet-sphere" style="--planet-color: #f472b6;"></div>
                <span class="planet-label">Load Balancer</span>
            </a>
        </div>
    </footer>

    <main class="container">
        <header class="hero">
            <h1>HAProxy Load Balancer</h1>
        </header>

        <div class="main-block" id="main-block">
            <div class="controls" id="action-controls">
                <button id="callButton" class="btn-call">
                    <span class="btn-icon"></span>
                    <span>Send Request</span>
                </button>
                <button id="burstButton" class="btn-burst">
                    <span class="btn-icon"></span>
                    <span>Send 10 Requests</span>
                </button>
            </div>

            <div id="response" class="response-card" aria-live="polite">
                <div id="spinner" class="spinner" style="display: none;"></div>
                <div id="content">
                    <p class="placeholder">Click a button to see which server responds...</p>
                </div>
            </div>

            <div class="chart-section">
                <h2>Server Distribution</h2>
                <div id="distributionChart" class="distribution-chart">
                    <p class="placeholder">Send requests to see distribution data...</p>
                </div>
                <div class="chart-stats">
                    <span id="totalRequests">Total: 0</span>
                    <span id="uniqueServers">Servers: 0</span>
                </div>
            </div>

            <div class="log-section">
                <h2>Request Log</h2>
                <div id="requestLog" class="request-log">
                    <p class="placeholder">Responses will appear here...</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
